[package]
name = "oob"
version = "0.1.0"
edition = "2021"
description = "A thin wrapper around interactsh-client that shows a minimal, focused view of out-of-band interactions"

[dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
chrono = { version = "0.4", default-features = false, features = ["clock", "std"] }

[profile.release]
opt-level = 2
